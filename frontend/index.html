<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Security Posture Dashboard</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <h2>CloudSec</h2>
                </div>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#">Dashboard</a></li>
                <li><a href="#">Resources</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="topbar">
                <h1>Security Posture Overview</h1>
                <div id="mode-badge" class="badge">Loading...</div>
            </header>

            <!-- Summary Cards Section -->
            <section class="summary-cards">
                <div class="card summary-card">
                    <h3>Total Findings</h3>
                    <div class="card-value" id="total-count">0</div>
                </div>
                <div class="card summary-card severity-card-high">
                    <h3>High Severity</h3>
                    <div class="card-value" id="high-count">0</div>
                </div>
                <div class="card summary-card severity-card-medium">
                    <h3>Medium Severity</h3>
                    <div class="card-value" id="medium-count">0</div>
                </div>
                <div class="card summary-card severity-card-low">
                    <h3>Low Severity</h3>
                    <div class="card-value" id="low-count">0</div>
                </div>
            </section>

            <!-- Chart and Details Section -->
            <section class="dashboard-grid">
                <div class="card chart-container">
                    <h3>Severity Distribution</h3>
                    <canvas id="severityChart"></canvas>
                </div>

                <div class="card table-container">
                    <div class="table-header">
                        <h3>Security Findings</h3>
                        <div class="filters">
                            <select id="filter-severity">
                                <option value="All">All Severities</option>
                                <option value="High">High</option>
                                <option value="Medium">Medium</option>
                                <option value="Low">Low</option>
                            </select>
                            <select id="filter-category">
                                <option value="All">All Categories</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table id="findings-table">
                            <thead>
                                <tr>
                                    <th>Resource Name</th>
                                    <th>Category</th>
                                    <th>Severity</th>
                                    <th>Description</th>
                                    <th>Recommendation</th>
                                </tr>
                            </thead>
                            <tbody id="findings-body">
                                <!-- Dynamic rows inserted here -->
                                <tr>
                                    <td colspan="5" class="loading-state">Loading findings...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Application Logic -->
    <script src="script.js"></script>
</body>
</html>
