<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>TaskApp<span>.</span></h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-filter="all">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-filter="pending">
                    <span class="icon">⏳</span>
                    <span>Pending Tasks</span>
                </a>
                <a href="#" class="nav-item" data-filter="completed">
                    <span class="icon">✅</span>
                    <span>Completed Tasks</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="add-task-btn" class="btn-primary">
                    <span class="icon">+</span> New Task
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-titles">
                    <h1>Overview</h1>
                    <p class="subtitle">Welcome back! Here's your task summary.</p>
                </div>
                <div class="header-actions">
                    <div class="date-display" id="current-date"></div>
                </div>
            </header>

            <!-- Analytics Cards -->
            <section class="analytics-cards">
                <div class="card stat-card">
                    <div class="stat-info">
                        <h3>Total Tasks</h3>
                        <p id="stat-total" class="stat-value">0</p>
                    </div>
                    <div class="stat-icon purple-bg">📋</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-info">
                        <h3>Completion</h3>
                        <p id="stat-completion" class="stat-value">0%</p>
                    </div>
                    <div class="stat-icon green-bg">📈</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-info">
                        <h3>Overdue</h3>
                        <p id="stat-overdue" class="stat-value">0</p>
                    </div>
                    <div class="stat-icon red-bg">⏰</div>
                </div>
                <div class="card stat-card">
                    <div class="stat-info">
                        <h3>Highest Category</h3>
                        <p id="stat-top-category" class="stat-value">-</p>
                    </div>
                    <div class="stat-icon blue-bg">🏷️</div>
                </div>
            </section>

            <div class="dashboard-grid">
                <!-- Task List Section -->
                <section class="task-section card">
                    <div class="section-header">
                        <h2>Your Tasks</h2>
                        <div class="task-filters">
                            <select id="filter-category" class="filter-select">
                                <option value="all">All Categories</option>
                                <option value="work">Work</option>
                                <option value="personal">Personal</option>
                                <option value="learning">Learning</option>
                                <option value="health">Health</option>
                            </select>
                            <select id="filter-priority" class="filter-select">
                                <option value="all">All Priorities</option>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                    </div>
                    <div class="task-list-container" id="task-list">
                        <!-- Tasks will be injected here dynamically -->
                        <div class="empty-state">No tasks found.</div>
                    </div>
                </section>

                <!-- Charts Section -->
                <section class="chart-section card">
                    <div class="section-header">
                        <h2>Task Distribution</h2>
                        <div class="chart-tabs">
                            <button class="tab-btn active" data-chart="status">Status</button>
                            <button class="tab-btn" data-chart="category">Category</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="taskChart"></canvas>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Add/Edit Task Modal -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Create New Task</h2>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-title">Task Title</label>
                    <input type="text" id="task-title" required placeholder="E.g., Finish project report">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-category">Category</label>
                        <select id="task-category" required>
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="learning">Learning</option>
                            <option value="health">Health</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority" required>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="task-due-date">Due Date</label>
                        <input type="date" id="task-due-date" required>
                    </div>
                    <div class="form-group">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="pending">Pending</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancel-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript files -->
    <script src="js/storage.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
